name: Gigwage
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
targets:
  Gigwage:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Gigwage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gigearnings
        GENERATE_INFOPLIST_FILE: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        DEVELOPMENT_TEAM: W7Q885Q59C
    info:
      path: Gigwage/Info.plist
      properties:
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
  GigwageTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GigwageTests
    dependencies:
      - target: Gigwage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gigearnings.tests
        DEVELOPMENT_TEAM: W7Q885Q59C
  GigwageUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GigwageUITests
    dependencies:
      - target: Gigwage
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.gigearnings.uitests
        DEVELOPMENT_TEAM: W7Q885Q59C
schemes:
  Gigwage:
    build:
      targets:
        Gigwage: all
    test:
      targets:
        - GigwageTests
        - GigwageUITests
    run:
      config: Debug
